<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTO Pay — Deliberation Audio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; width: 100%; }
    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #30363d;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    h1 span { color: #58a6ff; }
    .subtitle {
      color: #8b949e;
      font-size: 0.95rem;
    }
    .player-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .player-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .player-icon { font-size: 1.5rem; }
    .player-title { font-size: 1.1rem; font-weight: 600; }
    .player-meta {
      color: #8b949e;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    audio {
      width: 100%;
      height: 48px;
      border-radius: 8px;
      outline: none;
    }
    audio::-webkit-media-controls-panel { background: #21262d; }
    .transcript-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    .transcript-toggle {
      width: 100%;
      background: none;
      border: none;
      color: #e6edf3;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: inherit;
    }
    .transcript-toggle:hover { background: #1c2128; }
    .transcript-toggle .arrow { transition: transform 0.2s; }
    .transcript-toggle.open .arrow { transform: rotate(90deg); }
    .transcript-body {
      display: none;
      padding: 0 1.5rem 1.5rem;
      max-height: 60vh;
      overflow-y: auto;
    }
    .transcript-body.open { display: block; }
    .segment {
      margin-bottom: 1.25rem;
      padding-left: 1rem;
      border-left: 3px solid #30363d;
    }
    .segment.narrator { border-left-color: #8b949e; }
    .segment.designer { border-left-color: #58a6ff; }
    .segment.compiler { border-left-color: #3fb950; }
    .segment.architect { border-left-color: #d29922; }
    .segment.optimist { border-left-color: #f0883e; }
    .segment.pessimist { border-left-color: #f85149; }
    .segment-speaker {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }
    .narrator .segment-speaker { color: #8b949e; }
    .designer .segment-speaker { color: #58a6ff; }
    .compiler .segment-speaker { color: #3fb950; }
    .architect .segment-speaker { color: #d29922; }
    .optimist .segment-speaker { color: #f0883e; }
    .pessimist .segment-speaker { color: #f85149; }
    .segment-text {
      color: #c9d1d9;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .links {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #30363d;
    }
    .links a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.9rem;
      margin: 0 0.75rem;
    }
    .links a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      background: #1f6feb22;
      color: #58a6ff;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-left: 0.5rem;
    }
    #loading {
      text-align: center;
      color: #8b949e;
      padding: 2rem;
    }
    #error {
      display: none;
      background: #f8514922;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #f85149;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎧 <span>CTO Pay</span> Deliberation</h1>
      <p class="subtitle">Architecture deliberation audio — generated by the Morgan intake pipeline</p>
    </header>

    <div id="error"></div>
    <div id="players"></div>
    <div id="loading">Loading releases…</div>

    <div class="links">
      <a href="https://github.com/5dlabs/cto-pay">📦 Repository</a>
      <a href="https://github.com/5dlabs/cto-pay/pulls">🔀 Pull Requests</a>
      <a href="https://github.com/5dlabs/cto-pay/releases">📋 All Releases</a>
    </div>
  </div>

  <script>
    const AUDIO_FILES = [
      {
        name: 'architecture-deliberation',
        mp3: 'audio/architecture-deliberation.mp3',
        transcript: 'audio/architecture-deliberation.transcript.json'
      }
    ];

    async function loadAudio() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const playersEl = document.getElementById('players');

      loading.style.display = 'none';

      for (const file of AUDIO_FILES) {
        const name = file.name.replace(/-/g, ' ');

        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
          <div class="player-header">
            <span class="player-icon">🔊</span>
            <span class="player-title">${capitalize(name)}</span>
          </div>
          <div class="player-meta">CTO Pay — Morgan intake pipeline</div>
          <audio controls preload="metadata" src="${file.mp3}"></audio>
        `;
        playersEl.appendChild(card);

        if (file.transcript) {
          await renderTranscript(playersEl, file.transcript, file.name);
        }
      }
    }

    async function renderTranscript(container, url, baseName) {
      try {
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        const segments = data.segments || data;
        if (!Array.isArray(segments) || segments.length === 0) return;

        const section = document.createElement('div');
        section.className = 'transcript-section';

        const name = baseName.replace(/-/g, ' ');
        section.innerHTML = `
          <button class="transcript-toggle" onclick="toggleTranscript(this)">
            <span>📝 ${capitalize(name)} Transcript</span>
            <span class="arrow">▶</span>
          </button>
          <div class="transcript-body">
            ${segments.map(s => `
              <div class="segment ${s.speaker || ''}">
                <div class="segment-speaker">${s.label || s.speaker || 'Unknown'}</div>
                <div class="segment-text">${escapeHtml(s.text || '')}</div>
              </div>
            `).join('')}
          </div>
        `;
        container.appendChild(section);
      } catch (e) {
        // silently skip broken transcripts
      }
    }

    function toggleTranscript(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    function capitalize(s) {
      return s.replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    loadAudio();
  </script>
</body>
</html>
