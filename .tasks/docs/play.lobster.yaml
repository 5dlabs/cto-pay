    command: >
      echo "task-5 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 5, task_type: "task", agent: "tess", difficulty: 5, gate: "pass"}'

  # ── Task 6: Anchor Program Tests — Edge Cases, Error Paths, and Security Scenarios (Tess - TypeScript/Bankrun) (task, agent: tess, difficulty: 5) ──
  - name: run-task-6
    depends_on: [gate-task-4]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-6-tess
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "6"
          cto.5dlabs.ai/agent: "tess"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 6
        service: tess
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Tess
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
