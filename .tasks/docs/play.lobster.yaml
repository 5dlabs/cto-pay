name: play
description: >
  Master play workflow orchestrated by Morgan.
  Dispatches implementation agents per-task via CodeRun CRDs,
  then fans out quality/security/testing checks before gating.
  Morgan selects CLI and provider per-task based on difficulty,
  available credits, and user-defined provider preferences.

inputs:
  - name: tasks_dir
    description: Root directory containing per-task folders
  - name: repo_url
    default: "https://github.com/5dlabs/cto-pay"
  - name: namespace
    default: openclaw
  - name: base_branch
    default: main
  - name: cli
    description: Default CLI tool (claude, codex, cursor, gemini, etc.)
    default: claude
  - name: model
    description: Default LLM model — Morgan may override per-task based on difficulty + credits
    default: claude-sonnet-4-6
  - name: linear_session_id
    description: Linear agent session for status updates
    default: ""
  - name: linear_team_id
    default: ""
  - name: docs_repository_url
    default: ""
  - name: enable_docker
    default: "true"

steps:

  # ── Task 1: Dev Infra Bootstrap — Repo Scaffold, Secrets, Receipt Storage, ConfigMap (Bolt - Anchor CLI / K8s / SeaweedFS) (infra, agent: bolt, difficulty: 5) ──
  - name: run-task-1
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-1-bolt
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "1"
          cto.5dlabs.ai/agent: "bolt"
          cto.5dlabs.ai/task-type: "infra"
      spec:
        runType: implementation
        taskId: 1
        service: bolt
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Bolt
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 1001
            title: "Scaffold cto-pay Anchor repo with directory structure, Cargo.toml, and package.json workspaces"
            parallelizable: true
          - id: 1002
            title: "Provision SeaweedFS receipt bucket cto-pay-receipts"
            parallelizable: true
          - id: 1003
            title: "Provision operator keypair secret via 1Password → OpenBao → ExternalSecret pipeline"
            parallelizable: true
          - id: 1004
            title: "Create cto-pay-infra-endpoints ConfigMap and Helius API key ExternalSecret"
            parallelizable: false
            dependencies: ["1002", "1003"]
          - id: 1005
            title: "Generate devnet operator keypair, fund on devnet, and store in 1Password"
            parallelizable: false
            dependencies: ["1003"]
          - id: 1006
            title: "Create devnet setup script (scripts/setup-devnet.sh)"
            parallelizable: false
            dependencies: ["1001", "1005"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-1-bolt, waiting..." &&
      kubectl wait coderun/play-task-1-bolt
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-1 implementation complete" &&
      jq -nc '{task_id:1, agent:"bolt", phase:"implementation", status:"complete"}'

  - name: security-task-1
    depends_on: [run-task-1]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-1/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-1'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-1/bolt'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-1
    depends_on: [security-task-1]
    command: >
      echo "task-1 [infra] gate passed — all checks complete" &&
      jq -nc '{task_id: 1, task_type: "infra", agent: "bolt", difficulty: 5, gate: "pass"}'

  # ── Task 2: Anchor Program — Account Structures, Errors, Constants, and initialize_operator (Rex - Rust/Anchor 0.30+) (task, agent: rex, difficulty: 5) ──
  - name: run-task-2
    depends_on: [gate-task-1]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-2-rex
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "2"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 2
        service: rex
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Rex
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 2001
            title: "Implement state module — OperatorConfig, CustomerBalance, TaskReceipt structs with INIT_SPACE and TaskStatus enum"
            parallelizable: true
          - id: 2002
            title: "Implement constants.rs and errors.rs modules"
            parallelizable: true
          - id: 2003
            title: "Implement initialize_operator instruction with vault PDA token account creation"
            parallelizable: false
            dependencies: ["2001", "2002"]
          - id: 2004
            title: "Wire lib.rs entry point, configure clippy::pedantic, and verify full build + IDL output"
            parallelizable: false
            dependencies: ["2003"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-2-rex, waiting..." &&
      kubectl wait coderun/play-task-2-rex
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-2 implementation complete" &&
      jq -nc '{task_id:2, agent:"rex", phase:"implementation", status:"complete"}'

  - name: security-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-2/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-2'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-2/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-2/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-2'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-2/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: testing-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-2/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-2'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-2/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-2
    depends_on: [security-task-2, quality-task-2, testing-task-2]
    command: >
      echo "task-2 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 2, task_type: "task", agent: "rex", difficulty: 5, gate: "pass"}'

  # ── Task 3: Anchor Program — Customer Balance Operations: create, deposit, withdraw, update_spending_caps (Rex - Rust/Anchor 0.30+) (task, agent: rex, difficulty: 5) ──
  - name: run-task-3
    depends_on: [gate-task-2]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-3-rex
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "3"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 3
        service: rex
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Rex
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 3001
            title: "Implement create_customer_account instruction"
            parallelizable: true
          - id: 3002
            title: "Implement deposit instruction with SPL token CPI transfer"
            parallelizable: true
          - id: 3003
            title: "Implement withdraw instruction with vault PDA authority signing"
            parallelizable: true
          - id: 3004
            title: "Implement update_spending_caps instruction"
            parallelizable: true
          - id: 3005
            title: "Register all 4 customer instructions in lib.rs and verify build/IDL"
            parallelizable: false
            dependencies: ["3001", "3002", "3003", "3004"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-3-rex, waiting..." &&
      kubectl wait coderun/play-task-3-rex
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-3 implementation complete" &&
      jq -nc '{task_id:3, agent:"rex", phase:"implementation", status:"complete"}'

  - name: security-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-3/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-3'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-3/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-3/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-3'
