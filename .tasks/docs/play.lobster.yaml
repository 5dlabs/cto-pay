name: play
description: >
  Master play workflow orchestrated by Morgan.
  Dispatches implementation agents per-task via CodeRun CRDs,
  then fans out quality/security/testing checks before gating.
  Morgan selects CLI and provider per-task based on difficulty,
  available credits, and user-defined provider preferences.

args:
  tasks_dir:
    description: Root directory containing per-task folders
  repo_url:
    default: "https://github.com/5dlabs/cto-pay"
  namespace:
    default: openclaw
  base_branch:
    default: main
  cli:
    description: Default CLI tool (claude, codex, cursor, gemini, etc.)
    default: claude
  model:
    description: Default LLM model — Morgan may override per-task based on difficulty + credits
    default: claude-sonnet-4-6
  linear_session_id:
    description: Linear agent session for status updates
    default: ""
  linear_team_id:
    default: ""
  docs_repository_url:
    default: ""
  enable_docker:
    default: "true"
  discord_channel:
    description: Discord target channel for play notifications (e.g. play, execution)
    default: "play"

steps:

  # ── Play start notification ──
  - id: notify-play-start
    command: |
      echo '🎬 Play started — 10 tasks dispatching' | intake-util bridge-notify --from morgan --to ${discord_channel} --metadata '{"step":"play-start","task_count":10,"time_utc":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🎬 Play Started\n\n10 tasks dispatching to 1 harnesses.\n\n| Task | Title | Agent | CLI | Model | Type |\n|------|-------|-------|-----|-------|------|\n| 1 | Bootstrap Solana Dev Infrastructure & An | bolt | Claude Code | claude-opus-4-6-20260205 | infra |\n| 2 | Implement Anchor Program Core — Operator | rex | Claude Code | claude-opus-4-6-20260205 | task |\n| 3 | Implement Anchor Program Marketplace — A | rex | Claude Code | claude-opus-4-6-20260205 | task |\n| 4 | Build Arweave/Irys Receipt Upload Module | nova | Claude Code | claude-opus-4-6-20260205 | task |\n| 5 | Integrate Solana Settlement Hook into CT | rex | Claude Code | claude-opus-4-6-20260205 | task |\n| 6 | Build Hackathon Demo CLI Script — Full E | nova | Claude Code | claude-opus-4-6-20260205 | task |\n| 7 | Build Web Dashboard for Receipts, Balanc | blaze | Claude Code | claude-opus-4-6-20260205 | task |\n| 8 | Comprehensive Integration & E2E Test Sui | tess | Claude Code | claude-opus-4-6-20260205 | task |\n| 9 | Security Review of Solana Program — Auth | cipher | Claude Code | claude-opus-4-6-20260205 | task |\n| 10 | CI/CD Pipeline & Devnet Deployment Autom | atlas | Claude Code | claude-opus-4-6-20260205 | task |' >/dev/null || true


  # ── Task 1: Bootstrap Solana Dev Infrastructure & Anchor Workspace (Bolt - Kubernetes/Helm) (infra, agent: bolt, cli: Claude Code, model: claude-opus-4-6-20260205, difficulty: 5) ──
  - id: notify-task-1-start
    command: |
      echo '🚀 Task 1: Bootstrap Solana Dev Infrastructure & Anchor Wo... → Claude Code (claude-opus-4-6-20260205) — agent: bolt' | intake-util bridge-notify --from bolt --to ${discord_channel} --metadata '{"step":"task-dispatch","task_id":1,"agent":"bolt","cli":"Claude Code","model":"claude-opus-4-6-20260205","task_type":"infra"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🚀 Task 1 Dispatched\n\n**Bootstrap Solana Dev Infrastructure & Anchor Workspace (Bolt - Kubernetes/Helm)**\n- Agent: `bolt`\n- CLI: `Claude Code` / Model: `claude-opus-4-6-20260205`\n- Type: infra | Difficulty: 5\n- Subtasks: 6' >/dev/null || true

  - id: run-task-1
    depends_on: [notify-task-1-start]
    command: |
      # --- Primary attempt: Claude Code/claude-opus-4-6-20260205 ---
      PRIMARY_CLI="Claude Code"
      PRIMARY_MODEL="claude-opus-4-6-20260205"
      FALLBACK_CLI="codex"
      FALLBACK_MODEL="gpt-5.2-codex"
      TASK_ID=1
      AGENT="bolt"
      NS="${namespace}"
      RUN_NAME="play-task-1-bolt"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "1"
          cto.5dlabs.ai/agent: "bolt"
          cto.5dlabs.ai/task-type: "infra"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 1
        service: bolt
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Bolt
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 1001
            title: "Scaffold Anchor workspace directory structure and configuration files"
            parallelizable: true
          - id: 1002
            title: "Create Kubernetes namespace and Solana local validator deployment"
            parallelizable: true
          - id: 1003
            title: "Generate operator and treasury keypairs and store via OpenBao secrets pipeline"
            parallelizable: true
          - id: 1004
            title: "Create cto-billing-infra-endpoints ConfigMap with all environment references"
            parallelizable: false
            dependencies: ["1002", "1003"]
          - id: 1005
            title: "Create devnet USDC setup script with SOL airdrop and SPL token minting"
            parallelizable: false
            dependencies: ["1001", "1003"]
          - id: 1006
            title: "Create build tooling, environment documentation, and end-to-end verification"
            parallelizable: false
            dependencies: ["1001", "1002", "1003", "1004", "1005"]
      CODERUN_EOF
      }

      wait_coderun() {
        local run_name="$1"
        kubectl wait "coderun/$run_name" -n "$NS" \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=3600s
      }

      # Primary attempt
      echo "Submitting CodeRun $RUN_NAME ($PRIMARY_CLI/$PRIMARY_MODEL)..." &&
      apply_coderun "$PRIMARY_CLI" "$PRIMARY_MODEL" "$RUN_NAME" &&
      if wait_coderun "$RUN_NAME"; then
        echo "task-1 implementation complete ($PRIMARY_CLI/$PRIMARY_MODEL)"
      else
        # --- Fallback attempt: codex/gpt-5.2-codex ---
        FALLBACK_RUN="play-task-1-bolt-fallback"
        USED_CLI="$FALLBACK_CLI"
        USED_MODEL="$FALLBACK_MODEL"
        echo "⚠️ Primary $PRIMARY_CLI failed for task-1, falling back to $FALLBACK_CLI/$FALLBACK_MODEL..." &&
        echo '⚠️ Task 1: primary Claude Code failed, falling back to codex/gpt-5.2-codex' | intake-util bridge-notify --from bolt --to ${discord_channel} --metadata '{"step":"fallback-trigger","task_id":1,"agent":"bolt","primary_cli":"Claude Code","fallback_cli":"codex"}' || true
        kubectl delete "coderun/$RUN_NAME" -n "$NS" --ignore-not-found=true &&
        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-1 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:1, agent:"bolt", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

  - id: security-task-1
    depends_on: [run-task-1]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-1/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-1'
        --arg repo '${repo_url}'
        --arg branch 'task-1/bolt'
        --arg cli 'Claude Code'
        --arg model 'claude-opus-4-6-20260205'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: gate-task-1
    depends_on: [security-task-1]
    command: |
      echo "task-1 [infra] gate passed — Claude Code/claude-opus-4-6-20260205 — all checks complete" &&
      echo '✅ Task 1: Bootstrap Solana Dev Infrastructure & Anchor Wo... — gate passed (Claude Code/claude-opus-4-6-20260205)' | intake-util bridge-notify --from bolt --to ${discord_channel} --metadata '{"step":"gate-pass","task_id":1,"agent":"bolt","cli":"Claude Code","model":"claude-opus-4-6-20260205","checks":1}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## ✅ Task 1 Gate Passed\n\n**Bootstrap Solana Dev Infrastructure & Anchor Workspace (Bolt - Kubernetes/Helm)**\n- Agent: `bolt` | CLI: `Claude Code`\n- Checks passed: 1 (security-task-1)' >/dev/null || true
      jq -nc '{task_id: 1, task_type: "infra", agent: "bolt", cli: "Claude Code", model: "claude-opus-4-6-20260205", difficulty: 5, gate: "pass"}'

  # ── Task 2: Implement Anchor Program Core — Operator, Customer & Escrow Instructions (Rex - Rust/Anchor) (task, agent: rex, cli: Claude Code, model: claude-opus-4-6-20260205, difficulty: 5) ──
  - id: notify-task-2-start
    depends_on: [gate-task-1]
    command: |
      echo '🚀 Task 2: Implement Anchor Program Core — Operator, Custo... → Claude Code (claude-opus-4-6-20260205) — agent: rex' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"task-dispatch","task_id":2,"agent":"rex","cli":"Claude Code","model":"claude-opus-4-6-20260205","task_type":"task"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🚀 Task 2 Dispatched\n\n**Implement Anchor Program Core — Operator, Customer & Escrow Instructions (Rex - Rust/Anchor)**\n- Agent: `rex`\n- CLI: `Claude Code` / Model: `claude-opus-4-6-20260205`\n- Type: task | Difficulty: 5\n- Subtasks: 7' >/dev/null || true

  - id: run-task-2
    depends_on: [notify-task-2-start]
    command: |
      # --- Primary attempt: Claude Code/claude-opus-4-6-20260205 ---
      PRIMARY_CLI="Claude Code"
      PRIMARY_MODEL="claude-opus-4-6-20260205"
      FALLBACK_CLI="codex"
      FALLBACK_MODEL="gpt-5.2-codex"
      TASK_ID=2
      AGENT="rex"
      NS="${namespace}"
      RUN_NAME="play-task-2-rex"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "2"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 2
        service: rex
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Rex
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 2001
            title: "Define account state structures — OperatorConfig, CustomerBalance, and Vault PDA"
            parallelizable: true
          - id: 2002
            title: "Define custom error enum for all billing program errors"
            parallelizable: true
          - id: 2003
            title: "Implement daily spending cap reset helper function"
            parallelizable: false
            dependencies: ["2001"]
          - id: 2004
            title: "Implement operator instructions — initialize_operator, pause, and unpause"
            parallelizable: true
            dependencies: ["2001", "2002"]
          - id: 2005
            title: "Implement customer account management — create_customer_account and update_spending_caps"
            parallelizable: true
            dependencies: ["2001", "2002"]
          - id: 2006
            title: "Implement escrow token operations — deposit and withdraw with SPL transfer_checked"
            parallelizable: false
            dependencies: ["2001", "2002", "2003"]
          - id: 2007
            title: "Write comprehensive Rust unit tests and verify IDL generation"
            parallelizable: false
            dependencies: ["2004", "2005", "2006"]
      CODERUN_EOF
      }

      wait_coderun() {
        local run_name="$1"
        kubectl wait "coderun/$run_name" -n "$NS" \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=3600s
      }

      # Primary attempt
      echo "Submitting CodeRun $RUN_NAME ($PRIMARY_CLI/$PRIMARY_MODEL)..." &&
      apply_coderun "$PRIMARY_CLI" "$PRIMARY_MODEL" "$RUN_NAME" &&
      if wait_coderun "$RUN_NAME"; then
        echo "task-2 implementation complete ($PRIMARY_CLI/$PRIMARY_MODEL)"
      else
        # --- Fallback attempt: codex/gpt-5.2-codex ---
        FALLBACK_RUN="play-task-2-rex-fallback"
        USED_CLI="$FALLBACK_CLI"
        USED_MODEL="$FALLBACK_MODEL"
        echo "⚠️ Primary $PRIMARY_CLI failed for task-2, falling back to $FALLBACK_CLI/$FALLBACK_MODEL..." &&
        echo '⚠️ Task 2: primary Claude Code failed, falling back to codex/gpt-5.2-codex' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"fallback-trigger","task_id":2,"agent":"rex","primary_cli":"Claude Code","fallback_cli":"codex"}' || true
        kubectl delete "coderun/$RUN_NAME" -n "$NS" --ignore-not-found=true &&
        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-2 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:2, agent:"rex", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

  - id: security-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-2/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-2'
        --arg repo '${repo_url}'
        --arg branch 'task-2/rex'
        --arg cli 'Claude Code'
        --arg model 'claude-opus-4-6-20260205'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: quality-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-2/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-2'
        --arg repo '${repo_url}'
        --arg branch 'task-2/rex'
        --arg cli 'Claude Code'
        --arg model 'claude-opus-4-6-20260205'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: testing-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-2/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-2'
        --arg repo '${repo_url}'
        --arg branch 'task-2/rex'
        --arg cli 'Claude Code'
        --arg model 'claude-opus-4-6-20260205'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: gate-task-2
    depends_on: [security-task-2, quality-task-2, testing-task-2]
    command: |
      echo "task-2 [task] gate passed — Claude Code/claude-opus-4-6-20260205 — all checks complete" &&
      echo '✅ Task 2: Implement Anchor Program Core — Operator, Custo... — gate passed (Claude Code/claude-opus-4-6-20260205)' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"gate-pass","task_id":2,"agent":"rex","cli":"Claude Code","model":"claude-opus-4-6-20260205","checks":3}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## ✅ Task 2 Gate Passed\n\n**Implement Anchor Program Core — Operator, Customer & Escrow Instructions (Rex - Rust/Anchor)**\n- Agent: `rex` | CLI: `Claude Code`\n- Checks passed: 3 (security-task-2, quality-task-2, testing-task-2)' >/dev/null || true
      jq -nc '{task_id: 2, task_type: "task", agent: "rex", cli: "Claude Code", model: "claude-opus-4-6-20260205", difficulty: 5, gate: "pass"}'

  # ── Task 3: Implement Anchor Program Marketplace — Agent Packages, Settlement & Receipts (Rex - Rust/Anchor) (task, agent: rex, cli: Claude Code, model: claude-opus-4-6-20260205, difficulty: 5) ──
  - id: notify-task-3-start
    depends_on: [gate-task-2]
    command: |
      echo '🚀 Task 3: Implement Anchor Program Marketplace — Agent Pa... → Claude Code (claude-opus-4-6-20260205) — agent: rex' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"task-dispatch","task_id":3,"agent":"rex","cli":"Claude Code","model":"claude-opus-4-6-20260205","task_type":"task"}' || true
      LINEAR_SID="${linear_session_id}"
      [ -n "$LINEAR_SID" ] && intake-util linear-activity --session-id "$LINEAR_SID" --type action --body '## 🚀 Task 3 Dispatched\n\n**Implement Anchor Program Marketplace — Agent Packages, Settlement & Receipts (Rex - Rust/Anchor)**\n- Agent: `rex`\n- CLI: `Claude Code` / Model: `claude-opus-4-6-20260205`\n- Type: task | Difficulty: 5\n- Subtasks: 7' >/dev/null || true

  - id: run-task-3
    depends_on: [notify-task-3-start]
    command: |
      # --- Primary attempt: Claude Code/claude-opus-4-6-20260205 ---
      PRIMARY_CLI="Claude Code"
      PRIMARY_MODEL="claude-opus-4-6-20260205"
      FALLBACK_CLI="codex"
      FALLBACK_MODEL="gpt-5.2-codex"
      TASK_ID=3
      AGENT="rex"
      NS="${namespace}"
      RUN_NAME="play-task-3-rex"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "3"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 3
        service: rex
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Rex
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 3001
            title: "Define AgentPackage PDA, TaskReceipt PDA, and TaskStatus Enum Account Structures"
            parallelizable: false
          - id: 3002
            title: "Define Custom Error Variants for Marketplace and Settlement Instructions"
            parallelizable: true
          - id: 3003
            title: "Implement register_agent_package and update_agent_package Instructions"
            parallelizable: true
            dependencies: ["3001", "3002"]
          - id: 3004
            title: "Implement settle_task Instruction — Case 1 (No Agent Package, Full Treasury Transfer)"
            parallelizable: true
            dependencies: ["3001", "3002"]
          - id: 3005
            title: "Implement settle_task Instruction — Cases 2 & 3 (Agent Package with Quality-Gated Payment Splitting)"
            parallelizable: false
            dependencies: ["3001", "3002", "3004"]
          - id: 3006
            title: "Implement refund_task Instruction with Balance Restoration and Status Update"
            parallelizable: true
            dependencies: ["3001", "3002"]
          - id: 3007
            title: "Rust Unit Tests for Split Calculation Edge Cases and Overflow Protection"
            parallelizable: false
            dependencies: ["3003", "3004", "3005", "3006"]
      CODERUN_EOF
      }

      wait_coderun() {
        local run_name="$1"
        kubectl wait "coderun/$run_name" -n "$NS" \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=3600s
      }

      # Primary attempt
      echo "Submitting CodeRun $RUN_NAME ($PRIMARY_CLI/$PRIMARY_MODEL)..." &&
      apply_coderun "$PRIMARY_CLI" "$PRIMARY_MODEL" "$RUN_NAME" &&
      if wait_coderun "$RUN_NAME"; then
        echo "task-3 implementation complete ($PRIMARY_CLI/$PRIMARY_MODEL)"
      else
        # --- Fallback attempt: codex/gpt-5.2-codex ---
        FALLBACK_RUN="play-task-3-rex-fallback"
        USED_CLI="$FALLBACK_CLI"
        USED_MODEL="$FALLBACK_MODEL"
        echo "⚠️ Primary $PRIMARY_CLI failed for task-3, falling back to $FALLBACK_CLI/$FALLBACK_MODEL..." &&
        echo '⚠️ Task 3: primary Claude Code failed, falling back to codex/gpt-5.2-codex' | intake-util bridge-notify --from rex --to ${discord_channel} --metadata '{"step":"fallback-trigger","task_id":3,"agent":"rex","primary_cli":"Claude Code","fallback_cli":"codex"}' || true
        kubectl delete "coderun/$RUN_NAME" -n "$NS" --ignore-not-found=true &&
        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-3 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:3, agent:"rex", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

  - id: security-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-3/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-3'
        --arg repo '${repo_url}'
        --arg branch 'task-3/rex'
        --arg cli 'Claude Code'
        --arg model 'claude-opus-4-6-20260205'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: quality-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-3/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-3'
        --arg repo '${repo_url}'
        --arg branch 'task-3/rex'
        --arg cli 'Claude Code'
        --arg model 'claude-opus-4-6-20260205'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - id: testing-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "${tasks_dir}/task-3/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '${tasks_dir}/task-3'
        --arg repo '${repo_url}'
