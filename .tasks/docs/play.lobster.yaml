          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 6001
            title: "Spending cap enforcement tests — per-task limits, daily limits, boundary conditions, and cap reset via slot warp"
            parallelizable: true
          - id: 6002
            title: "Authorization failure tests — wrong signer rejection for all operator and customer instructions"
            parallelizable: true
          - id: 6003
            title: "Pause behavior tests — circuit breaker blocking and safety valve pass-through verification"
            parallelizable: true
          - id: 6004
            title: "Overflow and arithmetic edge case tests — u64 boundary, fee computation overflow, and zero amount rejection"
            parallelizable: true
          - id: 6005
