      AGENT="atlas"
      NS="${namespace}"
      RUN_NAME="play-task-10-atlas"
      USED_CLI="$PRIMARY_CLI"
      USED_MODEL="$PRIMARY_MODEL"

      apply_coderun() {
        local cli="$1" model="$2" run_name="$3"
        cat <<CODERUN_EOF | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: $run_name
        namespace: $NS
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "10"
          cto.5dlabs.ai/agent: "atlas"
          cto.5dlabs.ai/task-type: "task"
          cto.5dlabs.ai/cli: "$cli"
      spec:
        runType: implementation
        taskId: 10
        service: atlas
        repositoryUrl: ${repo_url}
        docsRepositoryUrl: ${docs_repository_url}
        model: $model
        githubApp: 5DLabs-Atlas
        enableDocker: ${enable_docker}
        cliConfig:
          cliType: $cli
          model: $model
        linearIntegration:
          enabled: true
          sessionId: ${linear_session_id}
          teamId: ${linear_team_id}
        subtasks:
          - id: 10001
            title: "Create Stage 1 CI workflow — build and lint jobs"
            parallelizable: true
          - id: 10002
            title: "Create Stage 2 CI workflow — test jobs with solana-test-validator"
            parallelizable: false
            dependencies: ["10001"]
          - id: 10003
            title: "Create Stage 3 CI workflow — devnet deployment with smoke test"
            parallelizable: false
            dependencies: ["10001"]
          - id: 10004
            title: "Create Stage 4 CI workflow — GitHub Release packaging"
            parallelizable: false
            dependencies: ["10002", "10003"]
          - id: 10005
            title: "Create Makefile with local development targets mirroring CI stages"
            parallelizable: true
