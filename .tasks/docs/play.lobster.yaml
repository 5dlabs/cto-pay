        apply_coderun "$FALLBACK_CLI" "$FALLBACK_MODEL" "$FALLBACK_RUN" &&
        wait_coderun "$FALLBACK_RUN" &&
        echo "task-10 implementation complete via fallback ($FALLBACK_CLI/$FALLBACK_MODEL)"
      fi &&
      jq -nc --arg cli "$USED_CLI" --arg model "$USED_MODEL" \
        '{task_id:10, agent:"atlas", cli:$cli, model:$model, phase:"implementation", status:"complete"}'

