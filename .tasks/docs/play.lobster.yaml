        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 5001
            title: "Test infrastructure — setup.ts and helpers.ts with Bankrun configuration and standard wallets"
            parallelizable: false
          - id: 5002
            title: "Initialize and customer lifecycle tests — OperatorConfig and CustomerBalance happy paths"
            parallelizable: true
            dependencies: ["5001"]
          - id: 5003
            title: "Settlement and refund tests — settle_task flow, fee verification, daily cap reset, and refund lifecycle"
            parallelizable: true
            dependencies: ["5001"]
          - id: 5004
