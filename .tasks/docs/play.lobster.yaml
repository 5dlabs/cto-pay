        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 4001
            title: "Implement settle_task instruction with 5-step validation chain, fee computation, and TaskReceipt initialization"
            parallelizable: true
          - id: 4002
            title: "Implement refund_task instruction with ledger-only accounting model"
            parallelizable: true
          - id: 4003
            title: "Implement pause and unpause circuit breaker instructions"
            parallelizable: true
          - id: 4004
            title: "Register all settlement instructions in lib.rs and verify complete 9-instruction IDL"
            parallelizable: false
            dependencies: ["4001", "4002", "4003"]
          - id: 4005
            title: "Add comprehensive doc comments to all public functions, structs, and security-critical code paths"
            parallelizable: false
            dependencies: ["4004"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-4-rex, waiting..." &&
      kubectl wait coderun/play-task-4-rex
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-4 implementation complete" &&
      jq -nc '{task_id:4, agent:"rex", phase:"implementation", status:"complete"}'

  - name: security-task-4
    depends_on: [run-task-4]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-4/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-4'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-4/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-4
    depends_on: [run-task-4]
    command: >
      lobster run --mode tool
