name: play
description: >
  Master play workflow orchestrated by Morgan.
  Dispatches implementation agents per-task via CodeRun CRDs,
  then fans out quality/security/testing checks before gating.
  Morgan selects CLI and provider per-task based on difficulty,
  available credits, and user-defined provider preferences.

inputs:
  - name: tasks_dir
    description: Root directory containing per-task folders
  - name: repo_url
    default: "https://github.com/5dlabs/cto-pay"
  - name: namespace
    default: openclaw
  - name: base_branch
    default: main
  - name: cli
    description: Default CLI tool (claude, codex, cursor, gemini, etc.)
    default: claude
  - name: model
    description: Default LLM model — Morgan may override per-task based on difficulty + credits
    default: claude-sonnet-4-6
  - name: linear_session_id
    description: Linear agent session for status updates
    default: ""
  - name: linear_team_id
    default: ""
  - name: docs_repository_url
    default: ""
  - name: enable_docker
    default: "true"

steps:

  # ── Task 1: Provision Core Infrastructure (Bolt - Kubernetes/Helm) (infra, agent: bolt, difficulty: 5) ──
  - name: run-task-1
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-1-bolt
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "1"
          cto.5dlabs.ai/agent: "bolt"
          cto.5dlabs.ai/task-type: "infra"
      spec:
        runType: implementation
        taskId: 1
        service: bolt
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Bolt
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 1001
            title: "Create Kubernetes namespaces: sigma1, databases, openclaw, signal"
            parallelizable: false
          - id: 1002
            title: "Deploy CloudNative-PG PostgreSQL 16 Cluster CR (sigma1-postgres)"
            parallelizable: false
            dependencies: ["1001"]
          - id: 1003
            title: "Run post-cluster schema init Job: create six schemas and per-service roles"
            parallelizable: false
            dependencies: ["1002"]
          - id: 1004
            title: "Deploy Opstree Valkey 7.2 single-replica instance (sigma1-valkey)"
            parallelizable: true
            dependencies: ["1001"]
          - id: 1005
            title: "Create all nine Kubernetes Secrets in the sigma1 namespace"
            parallelizable: true
            dependencies: ["1001"]
          - id: 1006
            title: "Deploy Signal-CLI pod, PVC, and ClusterIP Service in the signal namespace"
            parallelizable: true
            dependencies: ["1001"]
          - id: 1007
            title: "Create sigma1-infra-endpoints ConfigMap aggregating all connection strings"
            parallelizable: false
            dependencies: ["1002", "1004", "1006"]
          - id: 1008
            title: "Apply ArgoCD Application CR for the sigma1/infra Helm chart and validate full stack"
            parallelizable: false
            dependencies: ["1003", "1005", "1007"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-1-bolt, waiting..." &&
      kubectl wait coderun/play-task-1-bolt
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-1 implementation complete" &&
      jq -nc '{task_id:1, agent:"bolt", phase:"implementation", status:"complete"}'

  - name: security-task-1
    depends_on: [run-task-1]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-1/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-1'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-1/bolt'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-1
    depends_on: [security-task-1]
    command: >
      echo "task-1 [infra] gate passed — all checks complete" &&
      jq -nc '{task_id: 1, task_type: "infra", agent: "bolt", difficulty: 5, gate: "pass"}'

  # ── Task 2: Build Equipment Catalog Service (Rex - Rust/Axum) (task, agent: rex, difficulty: 5) ──
  - name: run-task-2
    depends_on: [gate-task-1]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-2-rex
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "2"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 2
        service: rex
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Rex
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 2001
            title: "Initialize Cargo workspace, declare all dependencies, and write sqlx catalog schema migrations"
            parallelizable: false
          - id: 2002
            title: "Implement application entrypoint, AppState, and database/Valkey connection pool setup"
            parallelizable: false
            dependencies: ["2001"]
          - id: 2003
            title: "Implement JWT extraction and validation middleware for admin-protected write endpoints"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2004
            title: "Implement catalog CRUD handlers: categories list and products list/get/create/update"
            parallelizable: false
            dependencies: ["2002", "2003"]
          - id: 2005
            title: "Implement availability calculation logic and GET /availability endpoint with unit tests"
            parallelizable: false
            dependencies: ["2004"]
          - id: 2006
            title: "Implement Valkey sliding-window rate limiter middleware"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2007
            title: "Implement AI agent machine-readable catalog endpoint and programmatic checkout endpoint"
            parallelizable: false
            dependencies: ["2005"]
          - id: 2008
            title: "Implement Prometheus metrics middleware and /metrics endpoint"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2009
            title: "Implement health check endpoints: /health/live and /health/ready"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2010
            title: "Implement internal GDPR export and deletion endpoints"
            parallelizable: true
            dependencies: ["2004"]
          - id: 2011
            title: "Write Dockerfile and Kubernetes Deployment/Service manifests for equipment-catalog"
            parallelizable: true
            dependencies: ["2002"]
          - id: 2012
            title: "Write integration test suite and verify cargo-tarpaulin coverage >= 80%"
            parallelizable: false
            dependencies: ["2005", "2007", "2010"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-2-rex, waiting..." &&
      kubectl wait coderun/play-task-2-rex
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-2 implementation complete" &&
      jq -nc '{task_id:2, agent:"rex", phase:"implementation", status:"complete"}'

  - name: security-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-2/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-2'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-2/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-2/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-2'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-2/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: testing-task-2
    depends_on: [run-task-2]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-2/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-2'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-2/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-2
    depends_on: [security-task-2, quality-task-2, testing-task-2]
    command: >
      echo "task-2 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 2, task_type: "task", agent: "rex", difficulty: 5, gate: "pass"}'

  # ── Task 3: Build Rental Management System Service (Grizz - Go/gRPC) (task, agent: grizz, difficulty: 5) ──
  - name: run-task-3
    depends_on: [gate-task-1]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-3-grizz
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "3"
          cto.5dlabs.ai/agent: "grizz"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 3
        service: grizz
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Grizz
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 3001
            title: "Initialize Go module and dependency manifest for RMS service"
            parallelizable: false
          - id: 3002
            title: "Define protobuf schemas for all five RMS domains"
            parallelizable: false
            dependencies: ["3001"]
          - id: 3003
            title: "Write database migrations for all seven RMS schema tables"
            parallelizable: true
            dependencies: ["3001"]
          - id: 3004
            title: "Implement OpportunityService gRPC handlers with REST gateway"
            parallelizable: false
            dependencies: ["3002", "3003"]
          - id: 3005
            title: "Implement ProjectService gRPC handlers including CheckOut and CheckIn"
            parallelizable: true
            dependencies: ["3002", "3003"]
          - id: 3006
            title: "Implement InventoryService with atomic conflict detection and unit tests"
            parallelizable: true
            dependencies: ["3002", "3003"]
          - id: 3007
            title: "Implement CrewService and DeliveryService gRPC handlers"
            parallelizable: true
            dependencies: ["3002", "3003"]
          - id: 3008
            title: "Implement ScoreLead algorithm with external vetting service HTTP call and unit tests"
            parallelizable: false
            dependencies: ["3004"]
          - id: 3009
            title: "Implement Google Calendar integration triggered on project confirmation"
            parallelizable: false
            dependencies: ["3005"]
          - id: 3010
            title: "Add Prometheus metrics and health endpoints on dedicated port 8081"
            parallelizable: true
            dependencies: ["3004"]
          - id: 3011
            title: "Implement GDPR export and delete endpoints"
            parallelizable: true
            dependencies: ["3004"]
          - id: 3012
            title: "Write Kubernetes Deployment and Service manifests for RMS"
            parallelizable: true
            dependencies: ["3010"]
          - id: 3013
            title: "Write integration tests for RMS service end-to-end flows"
            parallelizable: false
            dependencies: ["3004", "3005", "3006", "3011"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-3-grizz, waiting..." &&
      kubectl wait coderun/play-task-3-grizz
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-3 implementation complete" &&
      jq -nc '{task_id:3, agent:"grizz", phase:"implementation", status:"complete"}'

  - name: security-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-3/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-3'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-3/grizz'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-3/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-3'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-3/grizz'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: testing-task-3
    depends_on: [run-task-3]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-3/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-3'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-3/grizz'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-3
    depends_on: [security-task-3, quality-task-3, testing-task-3]
    command: >
      echo "task-3 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 3, task_type: "task", agent: "grizz", difficulty: 5, gate: "pass"}'

  # ── Task 4: Build Finance Service (Rex - Rust/Axum) (task, agent: rex, difficulty: 5) ──
  - name: run-task-4
    depends_on: [gate-task-1]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-4-rex
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "4"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 4
        service: rex
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Rex
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 4001
            title: "Initialize Cargo workspace and dependency manifest for Finance service"
            parallelizable: false
          - id: 4002
            title: "Write database migrations for all five Finance schema tables"
            parallelizable: true
            dependencies: ["4001"]
          - id: 4003
            title: "Implement invoice CRUD handlers with tax calculation and status state machine"
            parallelizable: false
            dependencies: ["4002"]
          - id: 4004
            title: "Implement payment recording handlers"
            parallelizable: false
            dependencies: ["4003"]
          - id: 4005
            title: "Implement Stripe invoice creation and webhook endpoint with signature validation"
            parallelizable: true
            dependencies: ["4003"]
          - id: 4006
            title: "Implement financial report endpoints (revenue, aging, cashflow, profitability)"
            parallelizable: true
            dependencies: ["4003", "4004"]
          - id: 4007
            title: "Implement payroll entry handlers"
            parallelizable: true
            dependencies: ["4002"]
          - id: 4008
            title: "Implement currency rate sync background task with Valkey caching"
            parallelizable: true
            dependencies: ["4002"]
          - id: 4009
            title: "Implement automated overdue invoice reminder background task"
            parallelizable: true
            dependencies: ["4003"]
          - id: 4010
            title: "Implement JWT authentication middleware"
            parallelizable: true
            dependencies: ["4003"]
          - id: 4011
            title: "Add Prometheus metrics and health endpoints"
            parallelizable: true
            dependencies: ["4001"]
          - id: 4012
            title: "Implement GDPR export and delete endpoints"
            parallelizable: true
            dependencies: ["4003", "4007"]
          - id: 4013
            title: "Write Kubernetes Deployment and Service manifests for Finance service"
            parallelizable: true
            dependencies: ["4011"]
          - id: 4014
            title: "Write integration tests for Finance service end-to-end flows"
            parallelizable: false
            dependencies: ["4003", "4004", "4005", "4006", "4009", "4012"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-4-rex, waiting..." &&
      kubectl wait coderun/play-task-4-rex
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-4 implementation complete" &&
      jq -nc '{task_id:4, agent:"rex", phase:"implementation", status:"complete"}'

  - name: security-task-4
    depends_on: [run-task-4]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-4/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-4'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-4/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-4
    depends_on: [run-task-4]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-4/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-4'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-4/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: testing-task-4
    depends_on: [run-task-4]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-4/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-4'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-4/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-4
    depends_on: [security-task-4, quality-task-4, testing-task-4]
    command: >
      echo "task-4 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 4, task_type: "task", agent: "rex", difficulty: 5, gate: "pass"}'

  # ── Task 5: Build Customer Vetting Service (Rex - Rust/Axum) (task, agent: rex, difficulty: 5) ──
  - name: run-task-5
    depends_on: [gate-task-1]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-5-rex
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
          cto.5dlabs.ai/task-id: "5"
          cto.5dlabs.ai/agent: "rex"
          cto.5dlabs.ai/task-type: "task"
      spec:
        runType: implementation
        taskId: 5
        service: rex
        repositoryUrl: {{inputs.repo_url}}
        docsRepositoryUrl: {{inputs.docs_repository_url}}
        model: {{inputs.model}}
        githubApp: 5DLabs-Rex
        enableDocker: {{inputs.enable_docker}}
        cliConfig:
          cliType: {{inputs.cli}}
          model: {{inputs.model}}
        linearIntegration:
          enabled: true
          sessionId: {{inputs.linear_session_id}}
          teamId: {{inputs.linear_team_id}}
        subtasks:
          - id: 5001
            title: "Initialize Cargo workspace and declare all dependencies"
            parallelizable: false
          - id: 5002
            title: "Write sqlx database migrations for vetting schema"
            parallelizable: false
            dependencies: ["5001"]
          - id: 5003
            title: "Implement POST /api/v1/vetting/run handler with async pipeline orchestration"
            parallelizable: false
            dependencies: ["5002"]
          - id: 5004
            title: "Implement OpenCorporates and LinkedIn pipeline steps with per-step timeout"
            parallelizable: false
            dependencies: ["5003"]
          - id: 5005
            title: "Implement Google Reviews pipeline step and weighted scoring algorithm"
            parallelizable: true
            dependencies: ["5003"]
          - id: 5006
            title: "Implement Valkey result caching with 24h TTL"
            parallelizable: false
            dependencies: ["5004", "5005"]
          - id: 5007
            title: "Implement JWT middleware, health endpoints, Prometheus metrics, and GDPR endpoints"
            parallelizable: true
            dependencies: ["5003"]
          - id: 5008
            title: "Write integration and unit test suite targeting >= 80% coverage"
            parallelizable: false
            dependencies: ["5004", "5005", "5006", "5007"]
      CODERUN_EOF
      # Wait for CodeRun to complete
      echo "Submitted CodeRun play-task-5-rex, waiting..." &&
      kubectl wait coderun/play-task-5-rex
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-5 implementation complete" &&
      jq -nc '{task_id:5, agent:"rex", phase:"implementation", status:"complete"}'

  - name: security-task-5
    depends_on: [run-task-5]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-5/security.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-5'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-5/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: quality-task-5
    depends_on: [run-task-5]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-5/quality.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-5'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-5/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: testing-task-5
    depends_on: [run-task-5]
    command: >
      lobster run --mode tool
      "{{inputs.tasks_dir}}/task-5/testing.lobster.yaml"
      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-5'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-5/rex'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-5
    depends_on: [security-task-5, quality-task-5, testing-task-5]
    command: >
      echo "task-5 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 5, task_type: "task", agent: "rex", difficulty: 5, gate: "pass"}'

  # ── Task 6: Build Social Media Engine (Nova - Node.js/Elysia+Effect) (task, agent: nova, difficulty: 5) ──
