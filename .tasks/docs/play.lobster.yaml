      --args-json "$(jq -nc --arg td '{{inputs.tasks_dir}}/task-10'
        --arg repo '{{inputs.repo_url}}'
        --arg branch 'task-10/bolt'
        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-10
    depends_on: [security-task-10]
    command: >
      echo "task-10 [infra] gate passed — all checks complete" &&
      jq -nc '{task_id: 10, task_type: "infra", agent: "bolt", difficulty: 5, gate: "pass"}'

  # ── Play complete ──
  - name: play-complete
    depends_on: [gate-task-1, gate-task-2, gate-task-3, gate-task-4, gate-task-5, gate-task-6, gate-task-7, gate-task-8, gate-task-9, gate-task-10]
    command: >
      echo "play complete — all 10 tasks passed gate checks" &&
      jq -nc '{play: "complete", tasks: 10, status: "pass"}'
