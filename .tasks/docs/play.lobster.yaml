        --arg cli '{{inputs.cli}}'
        --arg model '{{inputs.model}}'
        '{task_dir:$td, repo_url:$repo, branch_name:$branch, cli:$cli, model:$model}')"

  - name: gate-task-4
    depends_on: [security-task-4, quality-task-4, testing-task-4]
    command: >
      echo "task-4 [task] gate passed — all checks complete" &&
      jq -nc '{task_id: 4, task_type: "task", agent: "rex", difficulty: 5, gate: "pass"}'

  # ── Task 5: Anchor Program Tests — Happy-Path Integration Suite (Tess - TypeScript/Bankrun) (task, agent: tess, difficulty: 5) ──
  - name: run-task-5
    depends_on: [gate-task-4]
    command: |
      cat <<'CODERUN_EOF' | envsubst | kubectl apply -f -
      apiVersion: agents.platform/v1
      kind: CodeRun
      metadata:
        name: play-task-5-tess
        namespace: {{inputs.namespace}}
        labels:
          cto.5dlabs.ai/play: "true"
