      echo "Submitted CodeRun play-task-7-cipher, waiting..." &&
      kubectl wait coderun/play-task-7-cipher
        -n {{inputs.namespace}}
        --for=jsonpath='{.status.phase}'=Succeeded
        --timeout=3600s &&
      echo "task-7 implementation complete" &&
      jq -nc '{task_id:7, agent:"cipher", phase:"implementation", status:"complete"}'

