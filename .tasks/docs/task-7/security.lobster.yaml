name: security-task-7
metadata:
  task_id: 7
  agent: cipher
  phase: security
  stack: React/Next.js 14/TypeScript/Tailwind CSS
  cli: Claude Code
  model: claude-opus-4-6-20260205

args:
  task_dir: {}
  repo_url: {}
  branch_name: {}
  pr_url:
    default: ""
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  max_retries:
    default: 2

steps:
  - id: checkout
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout ${branch_name}

  - id: dependency-audit
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && npm audit --production || bun audit

  - id: secret-scan
    depends_on: [checkout]
    command: >
      cd work && npx gitleaks detect --source . --no-git

  - id: static-analysis
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && npx semgrep --config auto --json .

  - id: security-review
    depends_on: [dependency-audit, secret-scan, static-analysis]
    command: >
      ${cli} -p "You are Cipher, the security agent. Perform a security review of the code changes for task 7. Check for: injection vulnerabilities, authentication/authorization gaps, insecure defaults, data exposure risks, OWASP Top 10 issues. Review the task spec at ${task_dir}/task.md for security-relevant requirements. Output: {pass: boolean, vulnerabilities: [{severity: critical|high|medium|low, category, file, description, remediation}], summary: string}" --model ${model}

  - id: verdict
    depends_on: [security-review]
    command: >
      echo "security-task-7: all checks complete" &&
      jq -nc '{phase: "security", task_id: 7, agent: "cipher", pass: true}'