name: implement-task-7
metadata:
  task_id: 7
  agent: cipher
  stack: Anchor Verify, Soteria, Rust Security Analysis
  depends_on_tasks: [4, 5, 6]

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-7/feature-branch"
  - name: agent
    default: "cipher"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
  - name: setup
    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: implement-subtask-7001
    depends_on: [setup]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-7.7001/prompt.md

  - name: validate-subtask-7001
    depends_on: [implement-subtask-7001]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-7002
    depends_on: [validate-subtask-7001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-7.7002/prompt.md

  - name: validate-subtask-7002
    depends_on: [implement-subtask-7002]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-7003
    depends_on: [validate-subtask-7001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-7.7003/prompt.md

  - name: validate-subtask-7003
    depends_on: [implement-subtask-7003]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-7004
    depends_on: [validate-subtask-7001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-7.7004/prompt.md

  - name: validate-subtask-7004
    depends_on: [implement-subtask-7004]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-7005
    depends_on: [validate-subtask-7002, validate-subtask-7003, validate-subtask-7004]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-7.7005/prompt.md

  - name: validate-subtask-7005
    depends_on: [implement-subtask-7005]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: integration-validation
    depends_on: [validate-subtask-7001, validate-subtask-7002, validate-subtask-7003, validate-subtask-7004, validate-subtask-7005]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - name: acceptance-check
    depends_on: [integration-validation]
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt "Review changes against {{inputs.task_dir}}/acceptance.md. Output PASS or FAIL."

  - name: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-7" &&
      git push origin {{inputs.branch_name}} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-7" "$(cat {{inputs.task_dir}}/task.md)" "main"