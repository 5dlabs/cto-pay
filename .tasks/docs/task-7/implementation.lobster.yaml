name: implement-task-7
metadata:
  task_id: 7
  agent: blaze
  stack: React/Next.js 14/TypeScript/Tailwind CSS
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [1, 2]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-7/feature-branch"
  agent:
    default: "blaze"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-7001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7001/prompt.md)" --model ${model}

  - id: validate-subtask-7001
    depends_on: [implement-subtask-7001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7002
    depends_on: [validate-subtask-7001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7002/prompt.md)" --model ${model}

  - id: validate-subtask-7002
    depends_on: [implement-subtask-7002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7003
    depends_on: [validate-subtask-7001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7003/prompt.md)" --model ${model}

  - id: validate-subtask-7003
    depends_on: [implement-subtask-7003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7004
    depends_on: [validate-subtask-7001, validate-subtask-7002]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7004/prompt.md)" --model ${model}

  - id: validate-subtask-7004
    depends_on: [implement-subtask-7004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7005
    depends_on: [validate-subtask-7002, validate-subtask-7004]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7005/prompt.md)" --model ${model}

  - id: validate-subtask-7005
    depends_on: [implement-subtask-7005]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7006
    depends_on: [validate-subtask-7002, validate-subtask-7004, validate-subtask-7005]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7006/prompt.md)" --model ${model}

  - id: validate-subtask-7006
    depends_on: [implement-subtask-7006]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7007
    depends_on: [validate-subtask-7001, validate-subtask-7003, validate-subtask-7004]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7007/prompt.md)" --model ${model}

  - id: validate-subtask-7007
    depends_on: [implement-subtask-7007]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-7008
    depends_on: [validate-subtask-7007]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-7.7008/prompt.md)" --model ${model}

  - id: validate-subtask-7008
    depends_on: [implement-subtask-7008]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: integration-validation
    depends_on: [validate-subtask-7001, validate-subtask-7002, validate-subtask-7003, validate-subtask-7004, validate-subtask-7005, validate-subtask-7006, validate-subtask-7007, validate-subtask-7008]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-7" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-7" "$(cat ${task_dir}/task.md)" "main"