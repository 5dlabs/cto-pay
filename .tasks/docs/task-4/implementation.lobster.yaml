name: implement-task-4
metadata:
  task_id: 4
  agent: nova
  stack: Bun/TypeScript
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [1]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-4/feature-branch"
  agent:
    default: "nova"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p packages/receipt-uploader packages/receipt-uploader/src packages/receipt-uploader/scripts packages/receipt-uploader/tests

  - id: implement-subtask-4001
    depends_on: [scaffold-files]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-4.4001/prompt.md)" --model ${model}

  - id: validate-subtask-4001
    depends_on: [implement-subtask-4001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-4002
    depends_on: [validate-subtask-4001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-4.4002/prompt.md)" --model ${model}

  - id: validate-subtask-4002
    depends_on: [implement-subtask-4002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-4003
    depends_on: [validate-subtask-4002]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-4.4003/prompt.md)" --model ${model}

  - id: validate-subtask-4003
    depends_on: [implement-subtask-4003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: integration-validation
    depends_on: [validate-subtask-4001, validate-subtask-4002, validate-subtask-4003]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-4" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-4" "$(cat ${task_dir}/task.md)" "main"