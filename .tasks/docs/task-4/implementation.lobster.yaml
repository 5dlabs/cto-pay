    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: implement-subtask-4001
    depends_on: [setup]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-4.4001/prompt.md

  - name: validate-subtask-4001
    depends_on: [implement-subtask-4001]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-4002
