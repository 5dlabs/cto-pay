name: implement-task-4
metadata:
  task_id: 4
  agent: rex
  stack: Rust 1.75+/Axum 0.7
  depends_on_tasks: [1]

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-4/feature-branch"
  - name: agent
    default: "rex"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
