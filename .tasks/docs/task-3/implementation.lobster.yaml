    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: implement-subtask-3001
    depends_on: [setup]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-3.3001/prompt.md

  - name: validate-subtask-3001
    depends_on: [implement-subtask-3001]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && go vet ./... && go test ./... && golangci-lint run

