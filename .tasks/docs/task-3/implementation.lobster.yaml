name: implement-task-3
metadata:
  task_id: 3
  agent: tess
  stack: Anchor/TypeScript/Mocha
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [1, 2]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-3/feature-branch"
  agent:
    default: "tess"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p tests

  - id: implement-subtask-3001
    depends_on: [scaffold-files]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-3.3001/prompt.md)" --model ${model}

  - id: validate-subtask-3001
    depends_on: [implement-subtask-3001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-3002
    depends_on: [validate-subtask-3001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-3.3002/prompt.md)" --model ${model}

  - id: validate-subtask-3002
    depends_on: [implement-subtask-3002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-3003
    depends_on: [validate-subtask-3001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-3.3003/prompt.md)" --model ${model}

  - id: validate-subtask-3003
    depends_on: [implement-subtask-3003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-3004
    depends_on: [validate-subtask-3001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-3.3004/prompt.md)" --model ${model}

  - id: validate-subtask-3004
    depends_on: [implement-subtask-3004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-3005
    depends_on: [validate-subtask-3001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-3.3005/prompt.md)" --model ${model}

  - id: validate-subtask-3005
    depends_on: [implement-subtask-3005]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: integration-validation
    depends_on: [validate-subtask-3001, validate-subtask-3002, validate-subtask-3003, validate-subtask-3004, validate-subtask-3005]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-3" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-3" "$(cat ${task_dir}/task.md)" "main"