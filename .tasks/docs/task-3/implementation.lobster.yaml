name: implement-task-3
metadata:
  task_id: 3
  agent: grizz
  stack: Go 1.22+/gRPC/grpc-gateway
  depends_on_tasks: [1]

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-3/feature-branch"
  - name: agent
    default: "grizz"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
