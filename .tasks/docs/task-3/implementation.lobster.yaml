name: implement-task-3
metadata:
  task_id: 3
  agent: rex
  stack: Rust, Anchor 0.30.1, SPL Token
  depends_on_tasks: [2]

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-3/feature-branch"
  - name: agent
    default: "rex"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
  - name: setup
    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p programs/cto-pay/src/instructions programs/cto-pay/src

  - name: implement-subtask-3001
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-3.3001/prompt.md

  - name: validate-subtask-3001
    depends_on: [implement-subtask-3001]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-3002
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-3.3002/prompt.md

  - name: validate-subtask-3002
    depends_on: [implement-subtask-3002]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-3003
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-3.3003/prompt.md

  - name: validate-subtask-3003
    depends_on: [implement-subtask-3003]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-3004
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-3.3004/prompt.md

  - name: validate-subtask-3004
    depends_on: [implement-subtask-3004]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-3005
    depends_on: [validate-subtask-3001, validate-subtask-3002, validate-subtask-3003, validate-subtask-3004]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-3.3005/prompt.md

  - name: validate-subtask-3005
    depends_on: [implement-subtask-3005]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: integration-validation
    depends_on: [validate-subtask-3001, validate-subtask-3002, validate-subtask-3003, validate-subtask-3004, validate-subtask-3005]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - name: acceptance-check
    depends_on: [integration-validation]
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt "Review changes against {{inputs.task_dir}}/acceptance.md. Output PASS or FAIL."

  - name: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-3" &&
      git push origin {{inputs.branch_name}} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-3" "$(cat {{inputs.task_dir}}/task.md)" "main"