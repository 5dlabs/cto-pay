name: implement-task-6
metadata:
  task_id: 6
  agent: stitch
  stack: TypeScript/Solana-Web3.js/@coral-xyz/anchor
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [1, 2]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-6/feature-branch"
  agent:
    default: "stitch"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-6001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-6.6001/prompt.md)" --model ${model}

  - id: validate-subtask-6001
    depends_on: [implement-subtask-6001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-6002
    depends_on: [validate-subtask-6001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-6.6002/prompt.md)" --model ${model}

  - id: validate-subtask-6002
    depends_on: [implement-subtask-6002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-6003
    depends_on: [validate-subtask-6002]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-6.6003/prompt.md)" --model ${model}

  - id: validate-subtask-6003
    depends_on: [implement-subtask-6003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-6004
    depends_on: [validate-subtask-6003]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-6.6004/prompt.md)" --model ${model}

  - id: validate-subtask-6004
    depends_on: [implement-subtask-6004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: integration-validation
    depends_on: [validate-subtask-6001, validate-subtask-6002, validate-subtask-6003, validate-subtask-6004]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-6" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-6" "$(cat ${task_dir}/task.md)" "main"