name: implement-task-9
metadata:
  task_id: 9
  agent: cipher
  stack: Security Tooling
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [2, 3]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-9/feature-branch"
  agent:
    default: "cipher"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-9001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-9.9001/prompt.md)" --model ${model}

  - id: validate-subtask-9001
    depends_on: [implement-subtask-9001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && echo "No type checker configured" && echo "No test runner configured" && echo "No linter configured"

  - id: implement-subtask-9002
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-9.9002/prompt.md)" --model ${model}

  - id: validate-subtask-9002
    depends_on: [implement-subtask-9002]
