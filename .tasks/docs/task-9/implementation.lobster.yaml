      ${cli} -p "$(cat ${task_dir}/subtasks/task-9.9004/prompt.md)" --model ${model}

  - id: validate-subtask-9004
    depends_on: [implement-subtask-9004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && echo "No type checker configured" && echo "No test runner configured" && echo "No linter configured"

  - id: implement-subtask-9005
    depends_on: [setup]
