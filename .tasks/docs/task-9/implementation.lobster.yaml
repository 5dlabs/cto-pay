    depends_on: [implement-subtask-9006]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && echo "No type checker configured" && echo "No test runner configured" && echo "No linter configured"

  - id: implement-subtask-9007
    depends_on: [validate-subtask-9001, validate-subtask-9002, validate-subtask-9003, validate-subtask-9004, validate-subtask-9005, validate-subtask-9006]
