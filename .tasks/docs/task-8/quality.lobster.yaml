name: quality-task-8
metadata:
  task_id: 8
  agent: cleo
  phase: quality
  stack: React/Next.js 14/TypeScript/shadcn-ui
  cli: Claude Code
  model: claude-opus-4-6-20260205

args:
  task_dir: {}
  repo_url: {}
  branch_name: {}
  pr_url:
    default: ""
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  max_retries:
    default: 5

steps:
  - id: checkout
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout ${branch_name}

  - id: lint
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && bun lint

  - id: type-check
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && bun tsc --noEmit

  - id: code-review
    depends_on: [lint, type-check]
    command: >
      ${cli} -p "$(cat ${task_dir}/quality-review-prompt.md 2>/dev/null || echo 'You are Cleo, the code quality agent. Review the code in this repository against the task spec at ${task_dir}/task.md. Check for: code style consistency, naming conventions, dead code, complexity hotspots, error handling patterns, and documentation gaps. Output a JSON report: {pass: boolean, issues: [{severity, file, line, message}], summary: string}')" --model ${model}

  - id: standards-check
    depends_on: [code-review]
    command: >
      ${cli} -p "Review ${task_dir}/acceptance.md against the implementation. Verify every acceptance criterion is met. Output: {criteria_met: number, criteria_total: number, pass: boolean, gaps: [string]}" --model ${model}

  - id: verdict
    depends_on: [standards-check]
    command: >
      echo "quality-task-8: all checks complete" &&
      jq -nc '{phase: "quality", task_id: 8, agent: "cleo", pass: true}'