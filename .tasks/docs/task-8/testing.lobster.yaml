name: testing-task-8
metadata:
  task_id: 8
  agent: tess
  phase: testing
  stack: Test Frameworks
  cli: Claude Code
  model: claude-opus-4-6-20260205

args:
  task_dir: {}
  repo_url: {}
  branch_name: {}
  pr_url:
    default: ""
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  max_retries:
    default: 5

steps:
  - id: checkout
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout ${branch_name}

  - id: run-unit-tests
    depends_on: [checkout]
    retry: { max: "${max_retries}" }
    command: >
      cd work && echo "No unit test runner configured"

  - id: run-integration-tests
    depends_on: [run-unit-tests]
    retry: { max: "${max_retries}" }
    command: >
      cd work && echo "No integration test runner configured"

  - id: coverage-check
    depends_on: [run-unit-tests]
    command: >
      cd work && echo "No coverage tool configured"

  - id: test-adequacy-review
    depends_on: [run-integration-tests, coverage-check]
    command: >
      ${cli} -p "You are Tess, the testing agent. Review test coverage and adequacy for task 8. Read the task spec at ${task_dir}/task.md and acceptance criteria at ${task_dir}/acceptance.md. Evaluate: Are all acceptance criteria covered by tests? Are edge cases handled? Are there integration gaps? If tests are missing, generate them. Output: {pass: boolean, coverage_adequate: boolean, tests_generated: number, gaps: [string], summary: string}" --model ${model}

  - id: verdict
    depends_on: [test-adequacy-review]
    command: >
      echo "testing-task-8: all checks complete" &&
      jq -nc '{phase: "testing", task_id: 8, agent: "tess", pass: true}'