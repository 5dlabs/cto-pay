name: implement-task-8
metadata:
  task_id: 8
  agent: blaze
  stack: React/Next.js 14/TypeScript/shadcn-ui
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [7]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-8/feature-branch"
  agent:
    default: "blaze"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: implement-subtask-8001
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-8.8001/prompt.md)" --model ${model}

  - id: validate-subtask-8001
    depends_on: [implement-subtask-8001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-8002
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-8.8002/prompt.md)" --model ${model}

  - id: validate-subtask-8002
    depends_on: [implement-subtask-8002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-8003
    depends_on: [validate-subtask-8002]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-8.8003/prompt.md)" --model ${model}

  - id: validate-subtask-8003
    depends_on: [implement-subtask-8003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-8004
    depends_on: [setup]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-8.8004/prompt.md)" --model ${model}

  - id: validate-subtask-8004
    depends_on: [implement-subtask-8004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: implement-subtask-8005
    depends_on: [validate-subtask-8001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-8.8005/prompt.md)" --model ${model}

  - id: validate-subtask-8005
    depends_on: [implement-subtask-8005]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && bun tsc --noEmit && bun test && bun lint

  - id: integration-validation
    depends_on: [validate-subtask-8001, validate-subtask-8002, validate-subtask-8003, validate-subtask-8004, validate-subtask-8005]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-8" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-8" "$(cat ${task_dir}/task.md)" "main"