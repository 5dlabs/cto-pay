name: implement-task-2
metadata:
  task_id: 2
  agent: rex
  stack: Rust, Anchor 0.30.1, SPL Token
  depends_on_tasks: [1]

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-2/feature-branch"
  - name: agent
    default: "rex"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
  - name: setup
    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p programs/cto-pay/src programs/cto-pay/src/state programs/cto-pay/src/instructions

  - name: implement-subtask-2001
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-2.2001/prompt.md

  - name: validate-subtask-2001
    depends_on: [implement-subtask-2001]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-2002
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-2.2002/prompt.md

  - name: validate-subtask-2002
    depends_on: [implement-subtask-2002]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-2003
    depends_on: [validate-subtask-2001, validate-subtask-2002]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-2.2003/prompt.md

  - name: validate-subtask-2003
    depends_on: [implement-subtask-2003]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: implement-subtask-2004
    depends_on: [validate-subtask-2003]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-2.2004/prompt.md

  - name: validate-subtask-2004
    depends_on: [implement-subtask-2004]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - name: integration-validation
    depends_on: [validate-subtask-2001, validate-subtask-2002, validate-subtask-2003, validate-subtask-2004]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - name: acceptance-check
    depends_on: [integration-validation]
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt "Review changes against {{inputs.task_dir}}/acceptance.md. Output PASS or FAIL."

  - name: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-2" &&
      git push origin {{inputs.branch_name}} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-2" "$(cat {{inputs.task_dir}}/task.md)" "main"