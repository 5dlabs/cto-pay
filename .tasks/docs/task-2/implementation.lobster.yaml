name: implement-task-2
metadata:
  task_id: 2
  agent: rex
  stack: Rust/Anchor/Solana
  cli: Claude Code
  model: claude-opus-4-6-20260205
  depends_on_tasks: [1]

args:
  task_dir: {}
  repo_url: {}
  branch_name:
    default: "task-2/feature-branch"
  agent:
    default: "rex"
  cli:
    default: "Claude Code"
  model:
    default: "claude-opus-4-6-20260205"
  fallback_cli:
    default: "codex"
  fallback_model:
    default: "gpt-5.2-codex"
  max_implementation_retries:
    default: 10
  max_quality_retries:
    default: 5

steps:
  - id: setup
    command: >
      git clone ${repo_url} work && cd work &&
      git checkout -b ${branch_name}

  - id: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p programs/cto-billing/src/instructions programs/cto-billing/src tests

  - id: implement-subtask-2001
    depends_on: [scaffold-files]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-2.2001/prompt.md)" --model ${model}

  - id: validate-subtask-2001
    depends_on: [implement-subtask-2001]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: implement-subtask-2002
    depends_on: [validate-subtask-2001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-2.2002/prompt.md)" --model ${model}

  - id: validate-subtask-2002
    depends_on: [implement-subtask-2002]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: implement-subtask-2003
    depends_on: [validate-subtask-2002]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-2.2003/prompt.md)" --model ${model}

  - id: validate-subtask-2003
    depends_on: [implement-subtask-2003]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: implement-subtask-2004
    depends_on: [validate-subtask-2001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-2.2004/prompt.md)" --model ${model}

  - id: validate-subtask-2004
    depends_on: [implement-subtask-2004]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: implement-subtask-2005
    depends_on: [validate-subtask-2001]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-2.2005/prompt.md)" --model ${model}

  - id: validate-subtask-2005
    depends_on: [implement-subtask-2005]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: implement-subtask-2006
    depends_on: [validate-subtask-2002, validate-subtask-2003, validate-subtask-2004, validate-subtask-2005]
    retry: { max: "${max_implementation_retries}" }
    command: >
      ${cli} -p "$(cat ${task_dir}/subtasks/task-2.2006/prompt.md)" --model ${model}

  - id: validate-subtask-2006
    depends_on: [implement-subtask-2006]
    retry: { max: "${max_quality_retries}" }
    command: >
      cd work && cargo check && cargo test && cargo clippy -- -D warnings

  - id: integration-validation
    depends_on: [validate-subtask-2001, validate-subtask-2002, validate-subtask-2003, validate-subtask-2004, validate-subtask-2005, validate-subtask-2006]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - id: acceptance-check
    depends_on: [integration-validation]
    command: >
      ${cli} -p "Review changes against ${task_dir}/acceptance.md. Output PASS or FAIL." --model ${model}

  - id: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-2" &&
      git push origin ${branch_name} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-2" "$(cat ${task_dir}/task.md)" "main"