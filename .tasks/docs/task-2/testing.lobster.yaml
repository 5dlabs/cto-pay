name: testing-task-2
metadata:
  task_id: 2
  agent: tess
  phase: testing
  stack: Rust, Anchor 0.30.1, SPL Token

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
  - name: pr_url
    default: ""
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_retries
    default: 5

steps:
  - name: checkout
    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout {{inputs.branch_name}}

  - name: run-unit-tests
    depends_on: [checkout]
    retry: { max: "{{inputs.max_retries}}" }
    command: >
      cd work && cargo test --lib

  - name: run-integration-tests
    depends_on: [run-unit-tests]
    retry: { max: "{{inputs.max_retries}}" }
    command: >
      cd work && cargo test --test "*"

  - name: coverage-check
    depends_on: [run-unit-tests]
    command: >
      cd work && cargo llvm-cov --json

  - name: test-adequacy-review
    depends_on: [run-integration-tests, coverage-check]
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt
      "You are Tess, the testing agent. Review test coverage and adequacy for task 2.
      Read the task spec at {{inputs.task_dir}}/task.md and acceptance criteria at {{inputs.task_dir}}/acceptance.md.
      Evaluate: Are all acceptance criteria covered by tests? Are edge cases handled? Are there integration gaps?
      If tests are missing, generate them.
      Output: {pass: boolean, coverage_adequate: boolean, tests_generated: number, gaps: [string], summary: string}"

  - name: verdict
    depends_on: [test-adequacy-review]
    command: >
      echo "testing-task-2: all checks complete" &&
      jq -nc '{phase: "testing", task_id: 2, agent: "tess", pass: true}'